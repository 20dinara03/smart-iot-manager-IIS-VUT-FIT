{% extends "_base.html" %}

{% block title %} Delete Device {% endblock %}

{% block content %}
    <div class="container">
        <h1>Delete Device</h1>
        <p>Are you sure you want to delete this device?</p>
        <form method="post">
            {% csrf_token %}
            <input type="hidden" name="action" value="delete">
            <button type="submit" class="btn btn-danger">Delete Device</button>
            <a href="{% url 'device_detail' object.pk %}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
{% endblock %}
