{% extends "_base.html" %}

{% block content %}
<div class="card">
    <div class="card-body">
        <h2 class="card-title">Create a New Device</h2>
        <hr>

        <form method="post">
            {% csrf_token %}
            {{ device_form.as_p }}

            <button type="submit" class="btn btn-primary">Save Device</button>
        </form>
    </div>
</div>
{% endblock %}
