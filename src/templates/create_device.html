{% extends "_base.html" %}

{% block title %} Create New Device {% endblock %}

{% block content %}
    <div style="padding-bottom: 50px"></div>
    <div class="card">
        <div class="card-body">
            <h2 class="card-title">Create a New Device</h2>
            <hr style="padding-bottom: 30px">

            <div class="container">
                <form method="post" class="row g-2">
                    {% csrf_token %}
                    {% for field in device_form %}
                        <div class="mb-3 row">
                            <label class="form-label col-sm-2">{{ field.label_tag }}</label>
                            <div class=" col-sm-6">
                                {{ field }}
                                <div class="form-text">
                                    {{ field.help_text }}
                                </div>
                            </div>
                        </div>
                    {% endfor %}
                    <button type="submit" class="btn btn-primary">Save Device</button>
                </form>
            </div>
        </div>
    </div>
    <div style="padding-bottom: 50px"></div>
    <div></div>
{% endblock %}
