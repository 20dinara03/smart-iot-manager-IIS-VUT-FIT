{% extends "_base.html" %}
{% block header %} {% endblock %}
{% block content %}
    <h1>Login</h1>
    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}
    <form method="post" action={% url "login" %}>
        {% csrf_token %}
        {{ login }}
        <p><input type="submit" value="Login"></p>
    </form>


    <h1>Register</h1>
    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}
    <form method="post" action={% url "register" %}>
        {% csrf_token %}
        {{ register }}
        <p><input type="submit" value="Register"></p>
    </form>
{% endblock %}
