{% extends "_base.html" %}

{% block title %} Device Types {% endblock %}

{% block content %}
    <div class="container">
        <div class="row">
            <div class="col-8">
                <h2>Device Types</h2>
                <table class="table">
                    <tbody>
                        {% for device_type in object_list %}
                            <tr>
                                <td>
                                    <div class="d-flex align-items-center">
                                        <div class="device-info">
                                            <h4>{{ device_type.name }}</h4>
                                            <p>{{ device_type.description }}</p>
                                        </div>
                                    </div>
                                </td>
                                <td>
                                    <div class="container d-flex justify-content-end">
                                        <a href="{% url 'device_type_detail' device_type.pk %}" class="btn btn-info">Details</a>
                                    </div>
                                </td>
                            </tr>
                        {% empty %}
                            <tr>
                                <td colspan="2">No device types available.</td>
                            </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
            <div class="col-4">
                <a href="{% url 'device_type_create' %}" class="btn btn-primary">Add Device Type</a>
            </div>
        </div>
    </div>
{% endblock %}
