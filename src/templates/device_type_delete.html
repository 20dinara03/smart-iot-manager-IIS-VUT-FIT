{% extends "_base.html" %}

{% block title %} Delete Device Type {% endblock %}

{% block content %}
    <div class="container">
        <h2>Delete Device Type</h2>
        <p>Are you sure you want to delete the device type "{{ device_type.name }}"?</p>

        <form method="post">
            {% csrf_token %}
            <input type="hidden" name="action" value="delete">
            <button type="submit" class="btn btn-danger">Delete</button>
            <a href="{% url 'device_types' %}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
{% endblock %}
