{% extends "_base.html" %}

{% block title %} Create Device Group {% endblock %}

{% block content %}
    <h1>Create Device Group</h1>
    <form method="post" action="{% url 'create_device_group' %}">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Create Device Group</button>
    </form>
    <a href="{% url 'device_groups' %}" class="btn btn-secondary mt-3">Back to Device Groups</a>
{% endblock %}
