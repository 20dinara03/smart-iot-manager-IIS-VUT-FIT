{% extends "_base.html" %}

{% block title %}Edit Device{% endblock %}

{% block content %}
    <div class="container">
        <h1>Edit Device</h1>
        <form method="post">
            {% csrf_token %}
            <div class="container">
                <div class="row">
                    <div class="col-6">
                        {% if form.errors %}
                            <div class="alert alert-danger" role="alert">
                                <strong>Oops!</strong> Something went wrong.
                                {% for error in form.errors %}
                                    <p>{{ error }}</p>
                                {% endfor %}
                            </div>
                        {% endif %}
                        {{ form.as_p }}
                    </div>
                </div>
                <div class="row">
                    <div class="col-6">
                        <button type="submit" class="btn btn-primary">Save Changes</button>
                    </div>
                </div>
            </div>
        </form>
    </div>
{% endblock %}
