{% extends "_base.html" %}

{% block title %} Update Device Group {% endblock %}

{% block content %}
    <h1>Update Device Group</h1>
    <form method="post" action="{% url 'update_device_group' group.pk %}">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Update Device Group</button>
    </form>
    <a href="{% url 'device_groups' %}" class="btn btn-secondary mt-3">Back to Device Groups</a>
{% endblock %}
