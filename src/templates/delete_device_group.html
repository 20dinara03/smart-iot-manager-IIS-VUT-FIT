{% extends "_base.html" %}

{% block title %} Delete Device Group {% endblock %}

{% block content %}
    <h1>Delete Device Group</h1>
    <p>Are you sure you want to delete the group "{{ group.name }}"?</p>
    <form method="post" action="{% url 'delete_device_group' group.pk %}">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Delete</button>
    </form>
    <a href="{% url 'device_groups' %}" class="btn btn-secondary mt-3">Cancel</a>
{% endblock %}
